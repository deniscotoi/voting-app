# Worker Service Configuration (Background Job Processor)

replicaCount: 2

image:
  repository: voting-app-worker
  pullPolicy: IfNotPresent
  tag: "1.0.0"  # Overridden by CI/CD

containerPort: 8080
metricsPort: 8080

# Service configuration (internal only)
service:
  type: ClusterIP
  port: 8080
  targetPort: 8080
  metricsPort: 8080

# Resource requests and limits
resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

# Health checks
livenessProbe:
  httpGet:
    path: /health
  initialDelaySeconds: 30
  periodSeconds: 10
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /ready
  initialDelaySeconds: 10
  periodSeconds: 5
  failureThreshold: 3

# Pod annotations for monitoring
podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "8080"
  prometheus.io/path: "/metrics"

# Environment variables from ConfigMap
configMap:
  data:
    LOG_LEVEL: "info"
    ENVIRONMENT: "production"
    WORKER_PORT: "8080"
    DATABASE_HOST: "voting-app-prod-pg.database.windows.net"
    DATABASE_PORT: "5432"
    DATABASE_NAME: "votingapp"
    QUEUE_TYPE: "postgresql"
    BATCH_PROCESS_SIZE: "100"
    PROCESS_INTERVAL: "30s"

# Sensitive data (secrets)
secrets:
  DATABASE_USER: "pgadmin@voting-app-prod-pg"
  DATABASE_PASSWORD: "CHANGE_ME"  # Use Azure Key Vault

# Node selection for batch processing (can use preemptible nodes)
nodeSelector:
  workload-type: workers

# Affinity - spread across nodes
affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        preference:
          matchExpressions:
            - key: app.kubernetes.io/name
              operator: In
              values:
                - worker

# Autoscaling (based on queue depth)
autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 75
  # Custom metric: queue_depth
  targetRequestsPerSecond: "50"

# Service Account with RBAC
serviceAccount:
  create: true
  name: voting-app-worker
  annotations:
    azure.workload.identity/client-id: "CLIENT_ID_HERE"

# Graceful shutdown for background job processing
terminationGracePeriodSeconds: 60

# Not exposed via Ingress (internal service)
ingress:
  enabled: false

# Pod Disruption Budget for availability
podDisruptionBudget:
  enabled: true
  minAvailable: 1
